services:
  caddy:
    image: caddy:2-alpine
    container_name: homelab-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - internal

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: homelab-vaultwarden
    volumes:
      - vaultwarden_data:/data
    env_file:
      - .env
    environment:
      - DOMAIN=https://vault.${DOMAIN}
      - WEBSOCKET_ENABLED=true
      - SIGNUPS_ALLOWED=false
    restart: unless-stopped
    networks:
      - internal

  portfolio:
    image: nginx:alpine
    container_name: homelab-portfolio
    restart: unless-stopped
    networks:
      - internal

  vaultwarden-backup:
    image: alpine:3.19
    container_name: homelab-backup
    volumes:
      - vaultwarden_data:/data:ro
      - ./backup.sh:/backup.sh:ro
    environment:
      # Map dedicated backup IAM credentials to standard AWS env vars inside the container
      - AWS_ACCESS_KEY_ID=${BACKUP_AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${BACKUP_AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET}
      - BACKUP_PASSPHRASE=${BACKUP_PASSPHRASE}
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache aws-cli gnupg curl
        echo "0 3 * * * /backup.sh >> /var/log/backup.log 2>&1" | crontab -
        crond -f -l 8
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  vaultwarden_data:
    driver: local

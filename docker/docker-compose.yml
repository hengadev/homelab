services:
  caddy:
    image: caddy:2-alpine
    container_name: homelab-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - internal
      - proxy

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: homelab-vaultwarden
    volumes:
      - /opt/homelab/data/vaultwarden:/data
    env_file:
      - .env
    environment:
      - DOMAIN=https://vault.${DOMAIN}
      - WEBSOCKET_ENABLED=true
      - SIGNUPS_ALLOWED=false
    restart: unless-stopped
    networks:
      - internal

  portfolio:
    image: henga/portfolio:latest
    container_name: homelab-portfolio
    environment:
      - COMING_SOON=true
    restart: unless-stopped
    networks:
      - internal

  anki:
    build: ./anki
    container_name: homelab-anki
    volumes:
      - /opt/homelab/data/anki:/anki-data
    env_file:
      - .env
    environment:
      - SYNC_BASE=/anki-data
      - SYNC_USER1=${ANKI_SYNC_USER1}
      - SYNC_PORT=27701
    restart: unless-stopped
    networks:
      - internal

  vaultwarden-backup:
    image: alpine:3.19
    container_name: homelab-backup
    volumes:
      - /opt/homelab/data/vaultwarden:/data:ro
      - /opt/homelab/data/anki:/anki-data:ro
      - ./backup.sh:/backup.sh:ro
    environment:
      # Map dedicated backup IAM credentials to standard AWS env vars inside the container
      - AWS_ACCESS_KEY_ID=${BACKUP_AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${BACKUP_AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET}
      - BACKUP_PASSPHRASE=${BACKUP_PASSPHRASE}
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache aws-cli gnupg curl
        echo "0 3 * * * /backup.sh >> /var/log/backup.log 2>&1" | crontab -
        crond -f -l 8
    restart: unless-stopped
    networks:
      - internal

  vault:
    image: hashicorp/vault:1.15
    container_name: homelab-vault
    restart: unless-stopped
    user: "100:1000"
    entrypoint: ["/bin/sh", "-c", "exec vault server -config=/vault/config/vault.hcl"]
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
      VAULT_API_ADDR: http://0.0.0.0:8200
    expose:
      - "8200"
      - "8201"
    volumes:
      - vault_data:/vault/file
      - ./vault/config:/vault/config:ro
    networks:
      - internal
      - proxy
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  internal:
    driver: bridge
  proxy:
    external: true

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  vault_data:
    driver: local

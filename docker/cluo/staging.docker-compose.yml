services:
  # Staging API - connects to production's postgres and redis on shared network
  cluo-staging-api:
    image: ${CLUO_REGISTRY}/cluo-api:${CLUO_STAGING_TAG:-latest}
    container_name: cluo-staging-api
    env_file: .env
    ports:
      - "127.0.0.1:8081:8080"
    restart: unless-stopped
    networks:
      - cluo-prod-internal
      - proxy

  cluo-staging-web:
    image: ${CLUO_REGISTRY}/cluo-web:${CLUO_STAGING_TAG:-latest}
    container_name: cluo-staging-web
    env_file: .env
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      - cluo-staging-api
    restart: unless-stopped
    networks:
      - cluo-prod-internal
      - proxy

  cluo-staging-mobile:
    image: ${CLUO_REGISTRY}/cluo-mobile:${CLUO_STAGING_TAG:-latest}
    container_name: cluo-staging-mobile
    env_file: .env
    ports:
      - "127.0.0.1:3003:3000"
    depends_on:
      - cluo-staging-api
    restart: unless-stopped
    networks:
      - cluo-prod-internal
      - proxy

  cluo-staging-backup:
    image: alpine:3.19
    container_name: cluo-staging-backup
    volumes:
      - /opt/homelab/data/minio:/minio-data:ro
      - ./backup.sh:/backup.sh:ro
    environment:
      - AWS_ACCESS_KEY_ID=${CLUO_BACKUP_AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${CLUO_BACKUP_AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${CLUO_BACKUP_AWS_REGION}
      - BACKUP_S3_BUCKET=${CLUO_BACKUP_S3_BUCKET}
      - BACKUP_PASSPHRASE=${CLUO_BACKUP_PASSPHRASE}
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache aws-cli gnupg curl
        echo "0 2 * * * /backup.sh >> /var/log/cluo-backup.log 2>&1" | crontab -
        crond -f -l 8
    restart: unless-stopped

networks:
  # Join production's network to access shared postgres and redis
  cluo-prod-internal:
    external: true
  proxy:
    external: true

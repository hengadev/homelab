services:
  # Staging API - connects to production's postgres and redis on shared network
  cluo-staging-api:
    image: ${CLUO_REGISTRY}/cluo-api:${CLUO_STAGING_TAG:-latest}
    container_name: cluo-staging-api
    env_file: .env
    ports:
      - "127.0.0.1:8081:8080"
    restart: unless-stopped
    networks:
      - cluo-prod-internal
      - proxy

  cluo-staging-web:
    image: ${CLUO_REGISTRY}/cluo-web:${CLUO_STAGING_TAG:-latest}
    container_name: cluo-staging-web
    env_file: .env
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      - cluo-staging-api
    restart: unless-stopped
    networks:
      - cluo-prod-internal
      - proxy

  cluo-staging-mobile:
    image: ${CLUO_REGISTRY}/cluo-mobile:${CLUO_STAGING_TAG:-latest}
    container_name: cluo-staging-mobile
    env_file: .env
    ports:
      - "127.0.0.1:3003:3000"
    depends_on:
      - cluo-staging-api
    restart: unless-stopped
    networks:
      - cluo-prod-internal
      - proxy

networks:
  # Join production's network to access shared postgres and redis
  cluo-prod-internal:
    external: true
  proxy:
    external: true

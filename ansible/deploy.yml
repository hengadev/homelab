---
# Homelab Docker services deployment playbook
# Run with: make deploy (variables passed via -e from Makefile)
- name: Deploy Docker services
  hosts: all
  become: true

  tasks:
    # =========================================================================
    # Vault setup (must be before other services that depend on it)
    # =========================================================================
    - name: Create Vault data directory with correct ownership
      ansible.builtin.file:
        path: /opt/homelab/vault
        state: directory
        owner: "100"
        group: "1000"
        mode: "0750"

    - name: Create Vault config directory
      ansible.builtin.file:
        path: /opt/homelab/vault/config
        state: directory
        owner: deploy
        group: deploy
        mode: "0755"

    - name: Generate Vault HCL configuration
      ansible.builtin.template:
        src: ../templates/vault.hcl.j2
        dest: /opt/homelab/vault/config/vault.hcl
        owner: deploy
        group: deploy
        mode: "0644"

    # =========================================================================
    # Prerequisites
    # =========================================================================
    - name: Ensure proxy Docker network exists
      ansible.builtin.command:
        cmd: docker network create proxy --driver bridge
      register: proxy_network
      failed_when: proxy_network.rc != 0 and 'already exists' not in proxy_network.stderr
      changed_when: proxy_network.rc == 0

    # =========================================================================
    # Homelab services
    # =========================================================================
    - name: Create /opt/homelab directory
      ansible.builtin.file:
        path: /opt/homelab
        state: directory
        owner: deploy
        group: deploy
        mode: "0750"

    - name: Create vaultwarden data directory
      ansible.builtin.file:
        path: /opt/homelab/data/vaultwarden
        state: directory
        owner: deploy
        group: deploy
        mode: "0750"

    - name: Create anki data directory
      ansible.builtin.file:
        path: /opt/homelab/data/anki
        state: directory
        owner: deploy
        group: deploy
        mode: "0750"

    # =========================================================================
    # Vaultwarden restore (skipped when data directory already has content)
    # =========================================================================
    - name: Check if Vaultwarden data directory is empty
      ansible.builtin.find:
        paths: /opt/homelab/data/vaultwarden
      register: vaultwarden_data_contents

    - name: Restore Vaultwarden from S3 backup
      when: vaultwarden_data_contents.matched == 0
      block:
        - name: Find latest Vaultwarden backup in S3
          ansible.builtin.shell:
            cmd: >
              aws s3 ls s3://{{ backup_s3_bucket }}/
              | grep 'vaultwarden_'
              | awk '{print $4}'
              | sort
              | tail -1
          environment:
            AWS_ACCESS_KEY_ID: "{{ backup_aws_access_key_id }}"
            AWS_SECRET_ACCESS_KEY: "{{ backup_aws_secret_access_key }}"
            AWS_DEFAULT_REGION: "{{ aws_default_region }}"
          register: latest_backup
          changed_when: false

        - name: Log notice when no backup found in S3
          ansible.builtin.debug:
            msg: "No Vaultwarden backup found in S3, starting fresh"
          when: latest_backup.stdout | trim == ""

        - name: Download latest Vaultwarden backup from S3
          ansible.builtin.command:
            cmd: >
              aws s3 cp
              s3://{{ backup_s3_bucket }}/{{ latest_backup.stdout | trim }}
              /tmp/{{ latest_backup.stdout | trim }}
          environment:
            AWS_ACCESS_KEY_ID: "{{ backup_aws_access_key_id }}"
            AWS_SECRET_ACCESS_KEY: "{{ backup_aws_secret_access_key }}"
            AWS_DEFAULT_REGION: "{{ aws_default_region }}"
          when: latest_backup.stdout | trim != ""
          changed_when: true

        - name: Decrypt Vaultwarden backup
          ansible.builtin.shell:
            cmd: >
              echo "{{ backup_passphrase }}" |
              gpg --batch --yes --passphrase-fd 0
              --decrypt
              --output /tmp/{{ latest_backup.stdout | trim | regex_replace('\.gpg$', '') }}
              /tmp/{{ latest_backup.stdout | trim }}
          when: latest_backup.stdout | trim != ""
          no_log: true
          changed_when: true

        - name: Extract Vaultwarden backup to data directory
          ansible.builtin.command:
            cmd: >
              tar -xzf /tmp/{{ latest_backup.stdout | trim | regex_replace('\.gpg$', '') }}
              -C /opt/homelab/data/vaultwarden
          when: latest_backup.stdout | trim != ""
          changed_when: true

        - name: Remove temporary backup files
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - "/tmp/{{ latest_backup.stdout | trim }}"
            - "/tmp/{{ latest_backup.stdout | trim | regex_replace('\\.gpg$', '') }}"
          when: latest_backup.stdout | trim != ""

    - name: Copy docker-compose.yml to server
      ansible.builtin.copy:
        src: ../docker/docker-compose.yml
        dest: /opt/homelab/docker-compose.yml
        owner: deploy
        group: deploy
        mode: "0644"

    - name: Create anki build directory
      ansible.builtin.file:
        path: /opt/homelab/anki
        state: directory
        owner: deploy
        group: deploy
        mode: "0755"

    - name: Copy anki Dockerfile to server
      ansible.builtin.copy:
        src: ../docker/anki/Dockerfile
        dest: /opt/homelab/anki/Dockerfile
        owner: deploy
        group: deploy
        mode: "0644"

    - name: Create anki-api build directory
      ansible.builtin.file:
        path: /opt/homelab/anki-api
        state: directory
        owner: deploy
        group: deploy
        mode: "0755"

    - name: Copy anki-api files to server
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: deploy
        group: deploy
        mode: "0644"
      loop:
        - { src: ../docker/anki-api/Dockerfile, dest: /opt/homelab/anki-api/Dockerfile }
        - { src: ../docker/anki-api/requirements.txt, dest: /opt/homelab/anki-api/requirements.txt }
        - { src: ../docker/anki-api/main.py, dest: /opt/homelab/anki-api/main.py }

    - name: Copy Caddyfile to server
      ansible.builtin.copy:
        src: ../docker/Caddyfile
        dest: /opt/homelab/Caddyfile
        owner: deploy
        group: deploy
        mode: "0644"
      notify: Restart Caddy container

    - name: Copy backup script to server
      ansible.builtin.copy:
        src: ../docker/backup/backup.sh
        dest: /opt/homelab/backup.sh
        owner: deploy
        group: deploy
        mode: "0755"
      notify: Restart backup container

    - name: Template .env file to server
      ansible.builtin.template:
        src: templates/env.j2
        dest: /opt/homelab/.env
        owner: deploy
        group: deploy
        mode: "0600"

    - name: Pull latest Docker images
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: /opt/homelab
      changed_when: true

    - name: Start Docker services
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: /opt/homelab
      changed_when: true

    # =========================================================================
    # Vault initialization and configuration
    # =========================================================================
    - name: Wait for Vault to be ready
      ansible.builtin.command:
        cmd: docker exec homelab-vault vault status
      register: vault_status
      until: vault_status.rc != 1
      retries: 10
      delay: 3
      changed_when: false
      failed_when: vault_status.rc not in [0, 2]

    - name: Check if Vault is initialized
      ansible.builtin.command:
        cmd: docker exec homelab-vault vault status -format=json
      register: vault_status_json
      changed_when: false
      failed_when: false

    - name: Parse Vault status
      ansible.builtin.set_fact:
        vault_initialized: "{{ (vault_status_json.stdout | from_json).initialized | bool }}"
        vault_sealed: "{{ (vault_status_json.stdout | from_json).sealed | bool }}"

    - name: Check if Vault keys exist
      ansible.builtin.stat:
        path: /opt/homelab/vault/vault-keys.txt
      register: vault_keys_stat

    - name: Initialize Vault (first time only)
      ansible.builtin.command:
        cmd: docker exec homelab-vault vault operator init -key-shares=3 -key-threshold=2 -format=json
      register: vault_init_output
      when:
        - not vault_initialized | default(false) | bool
        - not vault_keys_stat.stat.exists
      no_log: true

    - name: Save Vault unseal keys and root token
      ansible.builtin.copy:
        content: |
          VAULT_UNSEAL_KEY_1: {{ vault_init_output.stdout | from_json | json_query('unseal_keys_b64[0]') }}
          VAULT_UNSEAL_KEY_2: {{ vault_init_output.stdout | from_json | json_query('unseal_keys_b64[1]') }}
          VAULT_UNSEAL_KEY_3: {{ vault_init_output.stdout | from_json | json_query('unseal_keys_b64[2]') }}
          VAULT_ROOT_TOKEN: {{ vault_init_output.stdout | from_json | json_query('root_token') }}
        dest: /opt/homelab/vault/vault-keys.txt
        owner: deploy
        group: deploy
        mode: "0600"
      when:
        - vault_init_output.stdout is defined
        - vault_init_output.stdout | length > 0
      no_log: true

    - name: Load Vault credentials from file
      ansible.builtin.slurp:
        src: /opt/homelab/vault/vault-keys.txt
      register: vault_keys_file
      when: vault_keys_stat.stat.exists
      no_log: true

    - name: Parse Vault credentials from file
      ansible.builtin.set_fact:
        vault_unseal_key_1: "{{ vault_keys_file.content | b64decode | regex_search('VAULT_UNSEAL_KEY_1: ([^\\n]+)', '\\1') | first }}"
        vault_unseal_key_2: "{{ vault_keys_file.content | b64decode | regex_search('VAULT_UNSEAL_KEY_2: ([^\\n]+)', '\\1') | first }}"
        vault_root_token: "{{ vault_keys_file.content | b64decode | regex_search('VAULT_ROOT_TOKEN: ([^\\n]+)', '\\1') | first }}"
      when:
        - vault_keys_file.content is defined
      no_log: true

    - name: Override Vault credentials with fresh init values
      ansible.builtin.set_fact:
        vault_unseal_key_1: "{{ vault_init_output.stdout | from_json | json_query('unseal_keys_b64[0]') }}"
        vault_unseal_key_2: "{{ vault_init_output.stdout | from_json | json_query('unseal_keys_b64[1]') }}"
        vault_root_token: "{{ vault_init_output.stdout | from_json | json_query('root_token') }}"
      when:
        - vault_init_output is defined
        - vault_init_output.stdout is defined
        - vault_init_output.stdout | length > 0
      no_log: true

    - name: Unseal Vault with key 1
      ansible.builtin.command:
        cmd: docker exec homelab-vault vault operator unseal {{ vault_unseal_key_1 }}
      register: unseal_key1_result
      when:
        - vault_sealed | default(false) | bool
        - vault_unseal_key_1 is defined
      failed_when: false
      no_log: true

    - name: Unseal Vault with key 2
      ansible.builtin.command:
        cmd: docker exec homelab-vault vault operator unseal {{ vault_unseal_key_2 }}
      register: unseal_key2_result
      when:
        - vault_sealed | default(false) | bool
        - vault_unseal_key_2 is defined
      failed_when: false
      no_log: true

    - name: Wait for Vault to be unsealed
      ansible.builtin.command:
        cmd: docker exec homelab-vault vault status
      register: vault_unsealed_status
      until: vault_unsealed_status.rc == 0
      retries: 5
      delay: 2
      changed_when: false

    - name: Enable Transit secrets engine
      ansible.builtin.shell:
        cmd: |
          docker exec \
            -e VAULT_ADDR=http://127.0.0.1:8200 \
            -e VAULT_TOKEN={{ vault_root_token }} \
            homelab-vault \
            vault secrets enable -path=transit transit 2>&1 || true
      when:
        - vault_root_token is defined
      changed_when: false
      no_log: true

    - name: Enable KV v2 secrets engine
      ansible.builtin.shell:
        cmd: |
          docker exec \
            -e VAULT_ADDR=http://127.0.0.1:8200 \
            -e VAULT_TOKEN={{ vault_root_token }} \
            homelab-vault \
            vault secrets enable -path=secret kv-v2 2>&1 || true
      when:
        - vault_root_token is defined
      changed_when: false
      no_log: true

    - name: Create Cluo prod encryption key
      ansible.builtin.shell:
        cmd: |
          docker exec \
            -e VAULT_ADDR=http://127.0.0.1:8200 \
            -e VAULT_TOKEN={{ vault_root_token }} \
            homelab-vault \
            vault write -f transit/keys/cluo-prod 2>&1 || true
      when:
        - vault_root_token is defined
      changed_when: false
      no_log: true

    - name: Create Cluo staging encryption key
      ansible.builtin.shell:
        cmd: |
          docker exec \
            -e VAULT_ADDR=http://127.0.0.1:8200 \
            -e VAULT_TOKEN={{ vault_root_token }} \
            homelab-vault \
            vault write -f transit/keys/cluo-staging 2>&1 || true
      when:
        - vault_root_token is defined
      changed_when: false
      no_log: true

    - name: Generate and store prod pepper secret
      ansible.builtin.shell:
        cmd: |
          PEPPER_VALUE=$(openssl rand -base64 32 | tr -d '\n')
          docker exec \
            -e VAULT_ADDR=http://127.0.0.1:8200 \
            -e VAULT_TOKEN={{ vault_root_token }} \
            homelab-vault \
            vault kv put secret/cluo/prod/pepper value="$PEPPER_VALUE"
      when:
        - vault_root_token is defined
      changed_when: false
      no_log: true

    - name: Generate and store staging pepper secret
      ansible.builtin.shell:
        cmd: |
          PEPPER_VALUE=$(openssl rand -base64 32 | tr -d '\n')
          docker exec \
            -e VAULT_ADDR=http://127.0.0.1:8200 \
            -e VAULT_TOKEN={{ vault_root_token }} \
            homelab-vault \
            vault kv put secret/cluo/staging/pepper value="$PEPPER_VALUE"
      when:
        - vault_root_token is defined
      changed_when: false
      no_log: true

    - name: Create vault-token file for root token
      ansible.builtin.copy:
        content: "{{ vault_root_token }}"
        dest: /opt/homelab/.vault-token
        owner: deploy
        group: deploy
        mode: "0600"
      when:
        - vault_root_token is defined
      no_log: true

    - name: Ensure Vault is connected to proxy network
      ansible.builtin.shell:
        cmd: docker network connect proxy homelab-vault 2>/dev/null || true
      changed_when: false

    # Cluo production
    # =========================================================================
    - name: Create /opt/cluo directory
      ansible.builtin.file:
        path: /opt/cluo
        state: directory
        owner: deploy
        group: deploy
        mode: "0750"

    - name: Copy production docker-compose for cluo
      ansible.builtin.copy:
        src: ../docker/cluo/prod.docker-compose.yml
        dest: /opt/cluo/docker-compose.yml
        owner: deploy
        group: deploy
        mode: "0644"

    - name: Template production .env for cluo
      ansible.builtin.template:
        src: templates/cluo-prod.env.j2
        dest: /opt/cluo/.env
        owner: deploy
        group: deploy
        mode: "0600"

    - name: Pull cluo production images
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: /opt/cluo
      changed_when: true

    - name: Start cluo production services
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: /opt/cluo
      changed_when: true

    - name: Wait for production postgres to be ready
      ansible.builtin.command:
        cmd: docker exec cluo-prod-postgres pg_isready -U {{ cluo_prod_db_user }}
      register: pg_ready
      until: pg_ready.rc == 0
      retries: 10
      delay: 3
      changed_when: false

    # =========================================================================
    # Cluo staging
    # =========================================================================
    - name: Create /opt/cluo-staging directory
      ansible.builtin.file:
        path: /opt/cluo-staging
        state: directory
        owner: deploy
        group: deploy
        mode: "0750"

    - name: Copy staging docker-compose for cluo
      ansible.builtin.copy:
        src: ../docker/cluo/staging.docker-compose.yml
        dest: /opt/cluo-staging/docker-compose.yml
        owner: deploy
        group: deploy
        mode: "0644"

    - name: Template staging .env for cluo
      ansible.builtin.template:
        src: templates/cluo-staging.env.j2
        dest: /opt/cluo-staging/.env
        owner: deploy
        group: deploy
        mode: "0600"

    - name: Create staging database user on production postgres
      ansible.builtin.command:
        cmd: >
          docker exec cluo-prod-postgres psql -U {{ cluo_prod_db_user }} -d postgres -c
          "DO $$ BEGIN
             IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ cluo_staging_db_user }}') THEN
               CREATE ROLE {{ cluo_staging_db_user }} WITH LOGIN;
             END IF;
             ALTER ROLE {{ cluo_staging_db_user }} WITH LOGIN PASSWORD '{{ cluo_staging_db_password }}';
           END $$;"
      changed_when: true
      no_log: true

    - name: Create staging database on production postgres
      ansible.builtin.command:
        cmd: docker exec cluo-prod-postgres psql -U {{ cluo_prod_db_user }} -d postgres -c "CREATE DATABASE {{ cluo_staging_db_name }} OWNER {{ cluo_staging_db_user }};"
      register: create_staging_db
      failed_when: create_staging_db.rc != 0 and 'already exists' not in create_staging_db.stderr
      changed_when: create_staging_db.rc == 0
      no_log: true

    - name: Pull cluo staging images
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: /opt/cluo-staging
      changed_when: true

    - name: Start cluo staging services
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: /opt/cluo-staging
      changed_when: true

    - name: Wait for cluo staging API to be running
      ansible.builtin.command:
        cmd: docker inspect --format='{{ '{{' }}.State.Status{{ '}}' }}' cluo-staging-api
      register: staging_api_status
      until: staging_api_status.stdout == "running"
      retries: 10
      delay: 5
      changed_when: false

  handlers:
    - name: Restart backup container
      ansible.builtin.command:
        cmd: docker compose restart vaultwarden-backup
        chdir: /opt/homelab
      changed_when: true

    - name: Restart Caddy container
      ansible.builtin.command:
        cmd: docker compose up -d --force-recreate caddy
        chdir: /opt/homelab
      changed_when: true
